ShortDescription: Host game servers from home without port forwarding.
Description: >-
  GameRelay is a lightweight, self-hosted, open-source relay that exposes game
  servers running on your PC to the internet through a tiny relay you run on a
  cloud VPS. No port forwarding, no accounts, no subscriptions. Supports
  Minecraft, Palworld, Terraria, FiveM, Rust, Valheim and any TCP/UDP service.
